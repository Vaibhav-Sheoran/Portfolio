<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Page Not Found</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700;900&family=Instrument+Serif:ital@1&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #050508;
        font-family: 'Kanit', sans-serif;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
        padding: 20px;
      }
      .container { max-width: 600px; }
      .error-code {
        font-size: clamp(4rem, 20vw, 12rem);
        font-weight: 900;
        line-height: 1;
        background: linear-gradient(180deg, #1a3a4a 0%, #00e5ff 50%, #7df9ff 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 1rem;
      }
      .title {
        font-size: clamp(1.5rem, 5vw, 2.5rem);
        font-weight: 700;
        margin-bottom: 1rem;
        color: #e0f7ff;
      }
      .desc {
        font-size: clamp(0.9rem, 2vw, 1.1rem);
        color: rgba(224, 247, 255, 0.6);
        margin-bottom: 2rem;
        line-height: 1.6;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.875rem 2rem;
        border-radius: 9999px;
        background: linear-gradient(135deg, #0a0a1a 0%, #00b4d8 30%, #7b2ff7 65%, #00e5ff 100%);
        color: white;
        text-decoration: none;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        font-size: 0.875rem;
        transition: all 0.3s;
        box-shadow: 0 0 20px rgba(0, 229, 255, 0.4), 0 0 60px rgba(123, 47, 247, 0.2), inset 0 1px 0 rgba(255,255,255,0.1);
        outline: 2px solid rgba(0, 229, 255, 0.6);
        outline-offset: -3px;
      }
      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 0 30px rgba(0, 229, 255, 0.6), 0 0 80px rgba(123, 47, 247, 0.3), inset 0 1px 0 rgba(255,255,255,0.1);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="error-code">404</div>
      <h1 class="title">Page Not Found</h1>
      <p class="desc">
        The page you're looking for doesn't exist or has been moved.
        Let's get you back on track.
      </p>
      <a href="/" class="btn">
        <span>← Back Home</span>
      </a>
    </div>
  </body>
</html>
